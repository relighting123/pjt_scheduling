version: '3.8'

services:
  # 백엔드 API 서버
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scheduling-api
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_CONFIG=config/databases.yaml
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - scheduling-network
    restart: unless-stopped

  # React 프론트엔드
  frontend:
    image: node:20-alpine
    container_name: scheduling-frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001
    command: >
      sh -c "npm install && npm run dev"
    networks:
      - scheduling-network
    restart: unless-stopped

  # Nginx 리버스 프록시 (선택사항)
  nginx:
    image: nginx:alpine
    container_name: scheduling-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - scheduling-network
    restart: unless-stopped
    profiles:
      - with-nginx

networks:
  scheduling-network:
    driver: bridge
